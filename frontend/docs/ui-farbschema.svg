<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Farbschema des Gentleman Shops</title>
  <desc id="desc">Warme Braun-, Camel-, Creme- und Anthrazittoene mit ihren CSS-Farbwerten.</desc>
  <rect width="1200" height="520" fill="#fbf9f5"/>
  <text x="60" y="72" fill="#35271f" font-family="Georgia, serif" font-size="40">Gentleman Shop - Farbschema</text>
  <text x="60" y="108" fill="#746d66" font-family="Arial, sans-serif" font-size="18">Warm, hochwertig, ruhig und klar</text>

  <g transform="translate(60 150)">
    <rect width="205" height="220" rx="14" fill="#22201e"/>
    <text x="20" y="160" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Anthrazit</text>
    <text x="20" y="190" fill="#ded5ca" font-family="Arial, sans-serif" font-size="15">#22201e</text>
  </g>
  <g transform="translate(280 150)">
    <rect width="205" height="220" rx="14" fill="#35271f"/>
    <text x="20" y="160" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Dunkelbraun</text>
    <text x="20" y="190" fill="#ded5ca" font-family="Arial, sans-serif" font-size="15">#35271f</text>
  </g>
  <g transform="translate(500 150)">
    <rect width="205" height="220" rx="14" fill="#785b43"/>
    <text x="20" y="160" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="700">Mittelbraun</text>
    <text x="20" y="190" fill="#f3ede4" font-family="Arial, sans-serif" font-size="15">#785b43</text>
  </g>
  <g transform="translate(720 150)">
    <rect width="205" height="220" rx="14" fill="#bd9b77"/>
    <text x="20" y="160" fill="#35271f" font-family="Arial, sans-serif" font-size="18" font-weight="700">Camel / Gold</text>
    <text x="20" y="190" fill="#35271f" font-family="Arial, sans-serif" font-size="15">#bd9b77</text>
  </g>
  <g transform="translate(940 150)">
    <rect width="200" height="220" rx="14" fill="#f3ede4" stroke="#ded5ca" stroke-width="2"/>
    <text x="20" y="160" fill="#35271f" font-family="Arial, sans-serif" font-size="18" font-weight="700">Creme</text>
    <text x="20" y="190" fill="#746d66" font-family="Arial, sans-serif" font-size="15">#f3ede4</text>
  </g>

  <rect x="60" y="410" width="1080" height="52" rx="8" fill="#ffffff" stroke="#ded5ca"/>
  <circle cx="92" cy="436" r="10" fill="#365d42"/>
  <text x="115" y="442" fill="#746d66" font-family="Arial, sans-serif" font-size="16">Papierweiss #fbf9f5 und Weiss #ffffff schaffen Raum; Linien #ded5ca trennen Inhalte dezent.</text>
</svg>
