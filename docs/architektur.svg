<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="960" viewBox="0 0 1120 960" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1 L8 5 L2 9" fill="none" stroke="#35271f" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowmuted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1 L8 5 L2 9" fill="none" stroke="#785b43" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1120" height="960" fill="#fbf9f5"/>

  <text x="560" y="50" text-anchor="middle" font-size="27" font-weight="bold" fill="#35271f">Gentleman Shop — Applikationsarchitektur</text>
  <text x="560" y="78" text-anchor="middle" font-size="14" fill="#746d66">Komponenten · Datenflüsse · Ports    |    Dev-Setup und Produktion</text>

  <!-- CLIENTS -->
  <g>
    <rect x="180" y="108" width="300" height="78" rx="8" fill="#f3ede4" stroke="#ded5ca"/>
    <text x="330" y="142" text-anchor="middle" font-size="17" font-weight="bold" fill="#22201e">Endanwender</text>
    <text x="330" y="165" text-anchor="middle" font-size="12" fill="#746d66">Browser · Shop, Warenkorb, Wunschliste, Kauf</text>

    <rect x="640" y="108" width="300" height="78" rx="8" fill="#f3ede4" stroke="#ded5ca"/>
    <text x="790" y="142" text-anchor="middle" font-size="17" font-weight="bold" fill="#22201e">Administrator</text>
    <text x="790" y="165" text-anchor="middle" font-size="12" fill="#746d66">Browser · Dashboard, Produkt- &amp; User-Verwaltung</text>
  </g>

  <text x="560" y="214" text-anchor="middle" font-size="12.5" fill="#746d66">HTTPS :443 · HTTP :80 → 443 (Produktion)      |      Dev: direkt auf :3000</text>

  <line x1="330" y1="186" x2="470" y2="242" stroke="#35271f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="790" y1="186" x2="650" y2="242" stroke="#35271f" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- CADDY -->
  <g>
    <rect x="340" y="244" width="440" height="80" rx="8" fill="#35271f"/>
    <text x="560" y="278" text-anchor="middle" font-size="17" font-weight="bold" fill="#ffffff">Caddy · Reverse Proxy + TLS</text>
    <text x="560" y="302" text-anchor="middle" font-size="12" fill="#e0d5c9">Ports 80 / 443 · Let's-Encrypt-Zertifikat · nur Produktion</text>
  </g>

  <line x1="560" y1="324" x2="560" y2="402" stroke="#35271f" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="575" y="368" font-size="12" fill="#785b43">reverse_proxy → backend:3000</text>

  <!-- DOCKER NETWORK BOUNDARY -->
  <rect x="70" y="392" width="980" height="540" rx="14" fill="none" stroke="#bd9b77" stroke-width="1.5" stroke-dasharray="8 6"/>
  <text x="92" y="416" font-size="13" font-weight="bold" fill="#785b43">Docker-Compose · Netzwerk webshop-network (bridge)</text>

  <!-- BACKEND -->
  <g>
    <rect x="120" y="430" width="880" height="182" rx="8" fill="#ffffff" stroke="#ded5ca"/>
    <rect x="120" y="430" width="880" height="40" rx="8" fill="#35271f"/>
    <rect x="120" y="452" width="880" height="18" fill="#35271f"/>
    <text x="560" y="456" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">webshop-backend · Node.js + Express · Port 3000</text>

    <rect x="140" y="484" width="270" height="112" rx="6" fill="#f3ede4"/>
    <text x="158" y="508" font-size="13" font-weight="bold" fill="#35271f">Auslieferung</text>
    <text x="158" y="530" font-size="11.5" fill="#4b4641">Statisches Frontend (express.static)</text>
    <text x="158" y="550" font-size="11.5" fill="#4b4641">REST-API unter /api</text>
    <text x="158" y="570" font-size="11.5" fill="#4b4641">CORS + JSON-Parsing</text>
    <text x="158" y="590" font-size="11.5" fill="#4b4641">Fehler-/404-Handler</text>

    <rect x="425" y="484" width="270" height="112" rx="6" fill="#f3ede4"/>
    <text x="443" y="508" font-size="13" font-weight="bold" fill="#35271f">Schichten</text>
    <text x="443" y="530" font-size="11.5" fill="#4b4641">Routes → Middleware</text>
    <text x="443" y="550" font-size="11.5" fill="#4b4641">checkAuto · optionalAuth</text>
    <text x="443" y="570" font-size="11.5" fill="#4b4641">Controller → Service</text>
    <text x="443" y="590" font-size="11.5" fill="#4b4641">config/db · config/mail</text>

    <rect x="710" y="484" width="270" height="112" rx="6" fill="#f3ede4"/>
    <text x="728" y="508" font-size="13" font-weight="bold" fill="#35271f">Services</text>
    <text x="728" y="530" font-size="11.5" fill="#4b4641">Inventar · Wunschliste</text>
    <text x="728" y="550" font-size="11.5" fill="#4b4641">Authentifizierung · Autorisierung</text>
    <text x="728" y="570" font-size="11.5" fill="#4b4641">User-Verwaltung</text>
    <text x="728" y="590" font-size="11.5" fill="#4b4641">(+ Admin-Statistik, Health)</text>
  </g>

  <!-- ARROWS backend -> db / smtp -->
  <line x1="255" y1="612" x2="255" y2="680" stroke="#785b43" stroke-width="1.6" marker-end="url(#arrowmuted)"/>
  <text x="150" y="652" font-size="11.5" fill="#785b43">SQL · :5432 (pg Pool)</text>

  <line x1="865" y1="612" x2="865" y2="680" stroke="#785b43" stroke-width="1.6" marker-end="url(#arrowmuted)"/>
  <text x="742" y="652" font-size="11.5" fill="#785b43">SMTP · :1025 / :587</text>

  <!-- BOTTOM ROW: DB, pgAdmin, SMTP -->
  <g>
    <rect x="120" y="682" width="270" height="150" rx="8" fill="#ffffff" stroke="#ded5ca"/>
    <rect x="120" y="682" width="270" height="6" rx="3" fill="#365d42"/>
    <text x="138" y="712" font-size="15" font-weight="bold" fill="#35271f">PostgreSQL 16</text>
    <text x="138" y="734" font-size="11.5" fill="#746d66">Container: webshop-db</text>
    <text x="138" y="756" font-size="11.5" fill="#4b4641">Port 5432 (intern) · 5433 (Dev, extern)</text>
    <text x="138" y="778" font-size="11.5" fill="#4b4641">6 Tabellen · Volume postgres_data</text>
    <text x="138" y="800" font-size="11.5" fill="#4b4641">Schema/Seed via init.sql</text>
    <text x="138" y="822" font-size="11.5" fill="#4b4641">users, products, orders, wishlists …</text>

    <rect x="425" y="682" width="270" height="150" rx="8" fill="#ffffff" stroke="#ded5ca"/>
    <rect x="425" y="682" width="270" height="6" rx="3" fill="#bd9b77"/>
    <text x="443" y="712" font-size="15" font-weight="bold" fill="#35271f">pgAdmin</text>
    <text x="443" y="734" font-size="11.5" fill="#746d66">Container: webshop-dbadmin</text>
    <text x="443" y="756" font-size="11.5" fill="#4b4641">Port 5050</text>
    <text x="443" y="778" font-size="11.5" fill="#4b4641">Datenbank-Administration</text>
    <text x="443" y="800" font-size="11.5" fill="#4b4641">Entwicklungs-Werkzeug</text>

    <rect x="730" y="682" width="270" height="150" rx="8" fill="#ffffff" stroke="#ded5ca"/>
    <rect x="730" y="682" width="270" height="6" rx="3" fill="#785b43"/>
    <text x="748" y="712" font-size="15" font-weight="bold" fill="#35271f">Mailversand</text>
    <text x="748" y="734" font-size="11.5" fill="#746d66">nodemailer (config/mail.js)</text>
    <text x="748" y="756" font-size="11.5" fill="#4b4641">Dev: Maildev · SMTP :1025 · UI :1080</text>
    <text x="748" y="778" font-size="11.5" fill="#4b4641">Prod: smtp.strato.de :587</text>
    <text x="748" y="800" font-size="11.5" fill="#4b4641">Verifizierung, Magic-Login,</text>
    <text x="748" y="820" font-size="11.5" fill="#4b4641">Bestellbestätigung</text>
  </g>

  <!-- pgAdmin -> DB -->
  <line x1="425" y1="757" x2="392" y2="757" stroke="#785b43" stroke-width="1.6" marker-end="url(#arrowmuted)"/>
  <text x="398" y="748" font-size="10.5" fill="#785b43">:5432</text>

  <!-- PORT LEGEND -->
  <rect x="120" y="864" width="880" height="72" rx="8" fill="#f3ede4" stroke="#ded5ca"/>
  <text x="138" y="890" font-size="13" font-weight="bold" fill="#35271f">Ports im Überblick</text>
  <text x="138" y="913" font-size="11.5" fill="#4b4641">80 / 443 Caddy (Prod)   ·   3000 Backend   ·   5432 / 5433 PostgreSQL   ·   1025 / 1080 Maildev (Dev)   ·   587 Strato SMTP (Prod)   ·   5050 pgAdmin</text>
  <text x="138" y="930" font-size="10.5" fill="#746d66">Dev: Browser → Backend :3000 direkt (Maildev fängt Mails ab).    Prod: Browser → Caddy :443 → Backend :3000, echter Mailversand über Strato.</text>
</svg>
