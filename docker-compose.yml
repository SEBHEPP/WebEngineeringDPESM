services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: webshop-backend
    env_file:
      - ./backend/.env.example
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      maildev:
        condition: service_started
    networks:
      - webshop-network

  db:
    image: postgres:16-alpine
    container_name: webshop-db
    environment:
      POSTGRES_DB: webshop
      POSTGRES_USER: webshop_user
      POSTGRES_PASSWORD: webshop_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webshop_user -d webshop"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - webshop-network

  maildev:
    image: maildev/maildev:2.1.0
    container_name: webshop-maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    networks:
      - webshop-network

  dbadmin:
    image: dpage/pgadmin4:latest
    container_name: webshop-dbadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@webshop.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      db:
        condition: service_healthy
    networks:
      - webshop-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  webshop-network:
    driver: bridge
